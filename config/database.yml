# SQLite is used for local development and test. Production runs on a single
# PostgreSQL database (Neon) configured via DATABASE_URL. The whole Solid
# stack (Queue/Cache/Cable) lives on the primary connection in every
# environment for full dev/prod parity — see db/migrate for their tables.
sqlite: &sqlite
  adapter: sqlite3
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 5000

development:
  primary:
    <<: *sqlite
    database: storage/development.sqlite3

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *sqlite
  database: storage/test.sqlite3

# Production: a single Postgres database read from DATABASE_URL (the Neon
# connection string, which includes ?sslmode=require). prepared_statements and
# advisory_locks are disabled so the app works on EITHER Neon endpoint — the
# direct connection or the PgBouncer-backed "-pooler" endpoint (transaction
# pooling forbids session-level prepared statements and advisory locks).
production:
  primary:
    adapter: postgresql
    url: <%= ENV["DATABASE_URL"] %>
    prepared_statements: false
    advisory_locks: false
    # Pool must cover Puma's web threads AND the in-Puma Solid Queue worker
    # (3 worker threads + dispatcher + heartbeat ≈ 5), so add headroom on top of
    # RAILS_MAX_THREADS rather than equalling it. Override with DB_POOL if needed.
    pool: <%= ENV.fetch("DB_POOL") { ENV.fetch("RAILS_MAX_THREADS") { 5 }.to_i + 5 } %>
