# NOTE: kickoff times are relative so "upcoming" stays upcoming and "finished"
# stays in the past regardless of when the suite runs. The finished fixture also
# means ChampionPick.tournament_started? is true in the test database.
upcoming_group:
  home_team: spain
  away_team: canada
  stadium: metlife
  kickoff_at: <%= 7.days.from_now.iso8601 %>
  stage: group
  status: scheduled

finished_group:
  home_team: brazil
  away_team: france
  stadium: azteca
  kickoff_at: <%= 2.days.ago.iso8601 %>
  stage: group
  home_score: 2
  away_score: 1
  status: finished
